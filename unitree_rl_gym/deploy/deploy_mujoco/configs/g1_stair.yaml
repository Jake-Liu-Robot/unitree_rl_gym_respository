# MuJoCo Sim2Sim config for g1_stair policy on stair terrain.
# Staircase: 8 steps, step_width=0.31m, step_height=0.10m (matches Isaac Gym easy/medium difficulty)
#
# Update policy_path to point to your exported checkpoint after running:
#   python legged_gym/scripts/play.py --task=g1_stair
# Exported policy will be at:
#   {LEGGED_GYM_ROOT_DIR}/logs/g1_stair/exported/policies/policy_lstm_1.pt

policy_path: "{LEGGED_GYM_ROOT_DIR}/logs/g1_stair/exported/policies/policy_lstm_1.pt"
xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/g1_description/scene_stairs.xml"

# Total simulation time
simulation_duration: 120.0
# Simulation time step
simulation_dt: 0.002
# Controller update frequency (simulation_dt * control_decimation = 0.02s = 50Hz)
control_decimation: 10

kps: [100, 100, 100, 150, 40, 40, 100, 100, 100, 150, 40, 40]
kds: [2, 2, 2, 4, 2, 2, 2, 2, 2, 4, 2, 2]

default_angles: [-0.1,  0.0,  0.0,  0.3, -0.2, 0.0,
                 -0.1,  0.0,  0.0,  0.3, -0.2, 0.0]

ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.25
cmd_scale: [2.0, 2.0, 0.25]
num_actions: 12
num_obs: 47

# Walk forward at 0.5 m/s toward the stairs
cmd_init: [0.5, 0, 0]
